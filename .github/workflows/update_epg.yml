name: Auto Update EPG

on:
  schedule:
    # Menjalankan skrip setiap jam 15:00 WIB (08:00 UTC)
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Jalankan Skrip EPG
      run: python buat_epg.py

    - name: Commit dan Push epg.xml (Jika Ada)
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Mengecek apakah file epg.xml berhasil dibuat oleh skrip
        if [ -f epg.xml ]; then
          git add epg.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update EPG Harian" && git push)
          echo "Berhasil menyimpan epg.xml ke repository."
        else
          echo "File epg.xml tidak ditemukan (kemungkinan API tidak mengembalikan jadwal hari ini). Skip commit."
        fi
