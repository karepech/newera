name: Auto Update EPG

on:
  schedule:
    # Menjalankan skrip otomatis setiap jam 15:00 WIB (08:00 UTC)
    - cron: '0 8 * * *'
  workflow_dispatch: # Tombol manual "Run workflow"

permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Memasukkan library tambahan untuk web scraping
        pip install requests beautifulsoup4 lxml

    - name: Jalankan Skrip EPG
      run: python buat_epg.py

    - name: Commit dan Push epg.xml (Jika Ada)
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Mengecek apakah file epg.xml berhasil dibuat
        if [ -f epg.xml ]; then
          git add epg.xml
          
          # Jika ada antrean file yang berubah, lakukan commit
          if ! git diff --staged --quiet; then
            git commit -m "Update EPG Harian"
            
            # Tarik data terbaru dulu dari GitHub agar tidak bentrok
            git pull --rebase origin main
            
            # Simpan file ke GitHub
            git push origin main
            echo "Berhasil menyimpan epg.xml ke repository."
          else
            echo "Tidak ada perubahan data pada epg.xml. Skip push."
          fi
        else
          echo "File epg.xml tidak ditemukan. Skip commit."
        fi
