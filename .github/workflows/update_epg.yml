name: Auto Update EPG

on:
  schedule:
    # Menjalankan skrip setiap jam 00:00 WIB (17:00 UTC)
    - cron: '0 17 * * *'
  workflow_dispatch: # Mengizinkan skrip dijalankan manual lewat tombol

permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Jalankan Skrip EPG
      run: python buat_epg.py

    - name: Commit dan Push epg.xml
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add epg.xml
        # Cek apakah ada perubahan data. Jika ada, lakukan commit & push.
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update EPG Harian" && git push)
